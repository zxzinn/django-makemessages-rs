name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            platform_tag: macosx_10_12_x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            platform_tag: macosx_11_0_arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform_tag: manylinux_2_17_x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../django-makemessages-rs-${{ matrix.target }}.tar.gz django-makemessages-rs

      - name: Build wheel
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          WHEEL_DIR="wheel_build"
          PKG="django_makemessages_rs"
          DATA_DIR="${PKG}-${VERSION}.data"

          mkdir -p "${WHEEL_DIR}/${PKG}"
          mkdir -p "${WHEEL_DIR}/${DATA_DIR}/scripts"

          cp python/django_makemessages_rs/__init__.py "${WHEEL_DIR}/${PKG}/"
          cp python/django_makemessages_rs/__main__.py "${WHEEL_DIR}/${PKG}/"
          cp "target/${{ matrix.target }}/release/django-makemessages-rs" "${WHEEL_DIR}/${DATA_DIR}/scripts/"

          cat > "${WHEEL_DIR}/${PKG}-${VERSION}.dist-info/METADATA" <<PYEOF
          Metadata-Version: 2.1
          Name: django-makemessages-rs
          Version: ${VERSION}
          Summary: A fast Rust replacement for Django makemessages (~60x faster)
          Requires-Python: >=3.9
          PYEOF
          # Remove leading whitespace from heredoc
          sed -i.bak 's/^          //' "${WHEEL_DIR}/${PKG}-${VERSION}.dist-info/METADATA"
          rm -f "${WHEEL_DIR}/${PKG}-${VERSION}.dist-info/METADATA.bak"

          cat > "${WHEEL_DIR}/${PKG}-${VERSION}.dist-info/WHEEL" <<PYEOF
          Wheel-Version: 1.0
          Generator: custom
          Root-Is-Purelib: false
          Tag: py3-none-${{ matrix.platform_tag }}
          PYEOF
          sed -i.bak 's/^          //' "${WHEEL_DIR}/${PKG}-${VERSION}.dist-info/WHEEL"
          rm -f "${WHEEL_DIR}/${PKG}-${VERSION}.dist-info/WHEEL.bak"

          cat > "${WHEEL_DIR}/${PKG}-${VERSION}.dist-info/entry_points.txt" <<PYEOF
          [console_scripts]
          django-makemessages-rs = django_makemessages_rs.__main__:main
          PYEOF
          sed -i.bak 's/^          //' "${WHEEL_DIR}/${PKG}-${VERSION}.dist-info/entry_points.txt"
          rm -f "${WHEEL_DIR}/${PKG}-${VERSION}.dist-info/entry_points.txt.bak"

          touch "${WHEEL_DIR}/${PKG}-${VERSION}.dist-info/RECORD"

          WHEEL_NAME="${PKG}-${VERSION}-py3-none-${{ matrix.platform_tag }}.whl"
          cd "${WHEEL_DIR}"
          zip -r "../${WHEEL_NAME}" .
          cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            django-makemessages-rs-${{ matrix.target }}.tar.gz
            django_makemessages_rs-*.whl

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.whl
